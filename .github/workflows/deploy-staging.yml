name: Deploy staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:
    inputs:
      rollback_sha:
        description: "Commit SHA to deploy for rollback. Leave blank to deploy the current staging branch."
        required: false
        type: string

concurrency:
  group: staging-deploy
  cancel-in-progress: false

jobs:
  check:
    name: Build check
    if: github.repository == 'dpwebb/creditregulatorpro-staging'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

  deploy:
    name: Deploy to staging server
    if: github.repository == 'dpwebb/creditregulatorpro-staging'
    runs-on: ubuntu-latest
    needs: check
    environment: staging
    steps:
      - name: Choose commit to deploy
        id: target
        run: |
          if [ -n "${{ inputs.rollback_sha }}" ]; then
            echo "sha=${{ inputs.rollback_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare SSH
        env:
          STAGING_SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_SSH_PORT: ${{ secrets.STAGING_SSH_PORT || '22' }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$STAGING_SSH_PRIVATE_KEY" > ~/.ssh/staging_deploy_key.raw
          python3 - <<'PY'
          from pathlib import Path

          raw_path = Path.home() / ".ssh" / "staging_deploy_key.raw"
          key_path = Path.home() / ".ssh" / "staging_deploy_key"
          key = raw_path.read_text()
          key = key.replace("\\n", "\n")
          key = key.replace("\r\n", "\n").replace("\r", "\n").strip() + "\n"
          key_path.write_text(key)
          raw_path.unlink()
          PY
          chmod 600 ~/.ssh/staging_deploy_key
          ssh-keygen -y -f ~/.ssh/staging_deploy_key >/dev/null
          ssh-keyscan -p "$STAGING_SSH_PORT" "$STAGING_HOST" >> ~/.ssh/known_hosts

      - name: Deploy selected commit
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_SSH_PORT: ${{ secrets.STAGING_SSH_PORT || '22' }}
          TARGET_SHA: ${{ steps.target.outputs.sha }}
        run: |
          ssh -i ~/.ssh/staging_deploy_key -p "$STAGING_SSH_PORT" "$STAGING_USER@$STAGING_HOST" "TARGET_SHA='$TARGET_SHA' bash -s" <<'REMOTE'
            set -euo pipefail

            cd /opt/creditregulatorpro-staging/app
            git fetch --prune origin
            git checkout "$TARGET_SHA"
            corepack enable
            corepack prepare pnpm@10 --activate
            pnpm install --frozen-lockfile
            pnpm run build
            docker rm -f creditregulatorpro-staging 2>/dev/null || true
            docker compose up -d --build creditregulatorpro-staging
            git log -1 --oneline
          REMOTE
