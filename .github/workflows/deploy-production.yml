name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      rollback_sha:
        description: "Commit SHA to deploy for rollback. Leave blank to deploy the current main branch."
        required: false
        type: string
      run_ingest_worker:
        description: "Master production ingest worker activation gate. Must be true before dry-run or apply can run."
        required: false
        type: boolean
        default: false
      run_ingest_worker_dry_run:
        description: "Run a read-only bounded production ingest worker dry-run after deploy. Does not claim or process jobs."
        required: false
        type: boolean
        default: false
      run_ingest_worker_apply:
        description: "Run a bounded one-shot production ingest worker apply pass. Requires explicit guard inputs."
        required: false
        type: boolean
        default: false
      ingest_worker_max_jobs:
        description: "Required bounded production ingest worker job limit when a worker dry-run or apply is requested. Must be 1-5."
        required: false
        type: string
      ingest_worker_operator:
        description: "Safe operator identifier required for production apply."
        required: false
        type: string
      ingest_worker_apply_ack:
        description: "Must equal explicit-bounded-production-ingest-worker-apply for production apply."
        required: false
        type: string

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  resolve-target:
    name: Resolve deploy target SHA
    if: github.repository == 'dpwebb/creditregulatorpro-prod'
    runs-on: ubuntu-latest
    outputs:
      target_sha: ${{ steps.target.outputs.sha }}
      approved_branch: ${{ steps.target.outputs.approved_branch }}
      approved_branch_sha: ${{ steps.target.outputs.approved_branch_sha }}
    steps:
      - name: Check out repository for target resolution
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve and validate TARGET_SHA
        id: target
        env:
          ROLLBACK_SHA_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.rollback_sha || '' }}
          DEFAULT_TARGET_SHA: ${{ github.sha }}
          APPROVED_BRANCH: main
        run: |
          set -euo pipefail

          rollback_sha="${ROLLBACK_SHA_INPUT:-}"
          if [ -n "$rollback_sha" ]; then
            if ! printf '%s' "$rollback_sha" | grep -Eq '^[0-9a-fA-F]{40}$'; then
              echo "Invalid rollback_sha. Provide a full 40-character commit SHA or leave rollback_sha blank for a normal deploy."
              exit 1
            fi
            target_sha="$(printf '%s' "$rollback_sha" | tr '[:upper:]' '[:lower:]')"
          else
            target_sha="$(printf '%s' "$DEFAULT_TARGET_SHA" | tr '[:upper:]' '[:lower:]')"
          fi

          if ! printf '%s' "$target_sha" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "Resolved deploy target is not a full lowercase commit SHA."
            exit 1
          fi

          git fetch --force --prune origin "+refs/heads/${APPROVED_BRANCH}:refs/remotes/origin/${APPROVED_BRANCH}"
          if ! git cat-file -e "$target_sha^{commit}"; then
            echo "Resolved deploy target does not exist locally: ${target_sha}"
            exit 1
          fi
          if ! git merge-base --is-ancestor "$target_sha" "origin/${APPROVED_BRANCH}"; then
            echo "Resolved deploy target ${target_sha} is not reachable from approved branch origin/${APPROVED_BRANCH}."
            exit 1
          fi

          approved_branch_sha="$(git rev-parse "origin/${APPROVED_BRANCH}")"
          echo "sha=$target_sha" >> "$GITHUB_OUTPUT"
          echo "approved_branch=$APPROVED_BRANCH" >> "$GITHUB_OUTPUT"
          echo "approved_branch_sha=$approved_branch_sha" >> "$GITHUB_OUTPUT"

  check:
    name: Build and regression check
    if: github.repository == 'dpwebb/creditregulatorpro-prod'
    runs-on: ubuntu-latest
    needs: resolve-target
    steps:
      - name: Check out target repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-target.outputs.target_sha }}
          fetch-depth: 0

      - name: Verify validation checkout target SHA
        env:
          TARGET_SHA: ${{ needs.resolve-target.outputs.target_sha }}
          APPROVED_BRANCH: ${{ needs.resolve-target.outputs.approved_branch }}
          APPROVED_BRANCH_SHA: ${{ needs.resolve-target.outputs.approved_branch_sha }}
        run: |
          set -euo pipefail

          if ! printf '%s' "${TARGET_SHA:-}" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "Refusing production validation: TARGET_SHA must be a validated lowercase full commit SHA."
            exit 1
          fi

          git fetch --force --prune origin "+refs/heads/${APPROVED_BRANCH}:refs/remotes/origin/${APPROVED_BRANCH}"
          validation_sha="$(git rev-parse HEAD)"
          if [ "$validation_sha" != "$TARGET_SHA" ]; then
            echo "Production validation checkout SHA mismatch: expected ${TARGET_SHA}, got ${validation_sha}."
            exit 1
          fi

          if ! git merge-base --is-ancestor "$TARGET_SHA" "origin/${APPROVED_BRANCH}"; then
            echo "Production validation target ${TARGET_SHA} is not reachable from origin/${APPROVED_BRANCH}."
            exit 1
          fi

          evidence_target_sha="$(git rev-parse HEAD)"
          if [ "$evidence_target_sha" != "$TARGET_SHA" ]; then
            echo "Production deploy target evidence SHA mismatch: expected ${TARGET_SHA}, got ${evidence_target_sha}."
            exit 1
          fi

          {
            echo "### Production deploy target evidence"
            echo "- target_sha=${TARGET_SHA}"
            echo "- validation_sha=${validation_sha}"
            echo "- evidence_target_sha=${evidence_target_sha}"
            echo "- approved_branch=${APPROVED_BRANCH}"
            echo "- approved_branch_sha=${APPROVED_BRANCH_SHA}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build + internal regression checks
        run: pnpm run check

  deploy:
    name: Deploy to production server
    if: github.repository == 'dpwebb/creditregulatorpro-prod'
    runs-on: ubuntu-latest
    needs:
      - resolve-target
      - check
    environment: production
    steps:
      - name: Check out target repository for deploy verification
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-target.outputs.target_sha }}
          fetch-depth: 0

      - name: Verify deploy checkout target SHA
        env:
          TARGET_SHA: ${{ needs.resolve-target.outputs.target_sha }}
          APPROVED_BRANCH: ${{ needs.resolve-target.outputs.approved_branch }}
        run: |
          set -euo pipefail

          if ! printf '%s' "${TARGET_SHA:-}" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "Refusing production deploy: TARGET_SHA must be a validated lowercase full commit SHA."
            exit 1
          fi
          git fetch --force --prune origin "+refs/heads/${APPROVED_BRANCH}:refs/remotes/origin/${APPROVED_BRANCH}"
          deployed_sha="$(git rev-parse HEAD)"
          if [ "$deployed_sha" != "$TARGET_SHA" ]; then
            echo "Production deploy checkout SHA mismatch: expected ${TARGET_SHA}, got ${deployed_sha}."
            exit 1
          fi
          if ! git merge-base --is-ancestor "$TARGET_SHA" "origin/${APPROVED_BRANCH}"; then
            echo "Production deploy target ${TARGET_SHA} is not reachable from origin/${APPROVED_BRANCH}."
            exit 1
          fi
          echo "Production deploy target verified at ${deployed_sha}."

      - name: Prepare SSH
        env:
          PRODUCTION_SSH_PRIVATE_KEY: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_SSH_PORT: ${{ secrets.PRODUCTION_SSH_PORT || '22' }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$PRODUCTION_SSH_PRIVATE_KEY" > ~/.ssh/production_deploy_key.raw
          python3 - <<'PY'
          import base64
          import binascii
          from pathlib import Path

          raw_path = Path.home() / ".ssh" / "production_deploy_key.raw"
          key_path = Path.home() / ".ssh" / "production_deploy_key"
          raw = raw_path.read_text().strip()

          if (raw.startswith('"') and raw.endswith('"')) or (raw.startswith("'") and raw.endswith("'")):
              raw = raw[1:-1].strip()

          def normalize_newlines(text: str) -> str:
              return text.replace("\r\n", "\n").replace("\r", "\n").strip()

          def looks_like_private_key(text: str) -> bool:
              normalized = normalize_newlines(text)
              if "\\n" in normalized:
                  return False

              lines = [line.strip() for line in normalized.split("\n") if line.strip()]
              if len(lines) < 3:
                  return False

              begin = lines[0]
              end = lines[-1]

              return (
                  begin.startswith("-----BEGIN ")
                  and begin.endswith("PRIVATE KEY-----")
                  and end.startswith("-----END ")
                  and end.endswith("PRIVATE KEY-----")
              )

          def base64_candidates(text: str):
              compact = "".join(text.split())
              if not compact:
                  return

              for decoder in (base64.b64decode, base64.urlsafe_b64decode):
                  for candidate in (compact, compact + "=" * ((4 - len(compact) % 4) % 4)):
                      try:
                          decoded = decoder(candidate).decode("utf-8")
                      except (binascii.Error, UnicodeDecodeError, ValueError):
                          continue
                      yield normalize_newlines(decoded)

          key = None
          direct_candidates = [
              normalize_newlines(raw.replace("\\n", "\n")),
              normalize_newlines(raw),
          ]

          for candidate in direct_candidates:
              if looks_like_private_key(candidate):
                  key = candidate
                  break

          if key is None:
              for candidate in direct_candidates:
                  for decoded in base64_candidates(candidate):
                      if looks_like_private_key(decoded):
                          key = decoded
                          break
                  if key is not None:
                      break

          if key is None:
              raise SystemExit(
                  "PRODUCTION_SSH_PRIVATE_KEY is invalid. Store a full SSH private key "
                  "(BEGIN/END ... PRIVATE KEY) or base64 of that full text."
              )

          key_path.write_text(key + "\n")
          raw_path.unlink()
          PY
          chmod 600 ~/.ssh/production_deploy_key
          ssh-keygen -y -f ~/.ssh/production_deploy_key >/dev/null
          ssh-keyscan -p "$PRODUCTION_SSH_PORT" "$PRODUCTION_HOST" >> ~/.ssh/known_hosts

      - name: Deploy selected commit
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
          PRODUCTION_SSH_PORT: ${{ secrets.PRODUCTION_SSH_PORT || '22' }}
          TARGET_SHA: ${{ needs.resolve-target.outputs.target_sha }}
          RUN_PRODUCTION_INGEST_WORKER: ${{ github.event_name == 'workflow_dispatch' && inputs.run_ingest_worker || false }}
          RUN_PRODUCTION_INGEST_WORKER_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.run_ingest_worker_dry_run || false }}
          RUN_PRODUCTION_INGEST_WORKER_APPLY: ${{ github.event_name == 'workflow_dispatch' && inputs.run_ingest_worker_apply || false }}
          PRODUCTION_INGEST_WORKER_MAX_JOBS: ${{ inputs.ingest_worker_max_jobs || '' }}
          PRODUCTION_INGEST_WORKER_OPERATOR: ${{ inputs.ingest_worker_operator || '' }}
          PRODUCTION_INGEST_WORKER_APPLY_ACK: ${{ inputs.ingest_worker_apply_ack || '' }}
        run: |
          set -euo pipefail

          if ! printf '%s' "${TARGET_SHA:-}" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "Refusing production deploy: TARGET_SHA must be a validated lowercase full commit SHA."
            exit 1
          fi

          production_worker_requested="false"
          if [ "${RUN_PRODUCTION_INGEST_WORKER:-false}" = "true" ]; then
            production_worker_requested="true"
          fi

          if [ "${RUN_PRODUCTION_INGEST_WORKER:-false}" != "true" ]; then
            if [ "${RUN_PRODUCTION_INGEST_WORKER_DRY_RUN:-false}" = "true" ] ||
              [ "${RUN_PRODUCTION_INGEST_WORKER_APPLY:-false}" = "true" ]; then
              echo "Refusing production ingest worker input: run_ingest_worker=true is required before dry-run or apply."
              exit 1
            fi
          fi

          if [ "$production_worker_requested" = "true" ]; then
            if [ "${RUN_PRODUCTION_INGEST_WORKER_DRY_RUN:-false}" != "true" ] &&
              [ "${RUN_PRODUCTION_INGEST_WORKER_APPLY:-false}" != "true" ]; then
              echo "Refusing production ingest worker input: choose dry-run or apply when run_ingest_worker=true."
              exit 1
            fi
            case "${PRODUCTION_INGEST_WORKER_MAX_JOBS:-}" in
              1|2|3|4|5) ;;
              *)
                echo "Refusing production ingest worker input: ingest_worker_max_jobs must be explicitly set to 1-5 when a worker run is requested."
                exit 1
                ;;
            esac
          fi
          if [ -n "${PRODUCTION_INGEST_WORKER_OPERATOR:-}" ] &&
            ! printf '%s' "$PRODUCTION_INGEST_WORKER_OPERATOR" | grep -Eq '^[a-zA-Z0-9_.:-]{1,120}$'; then
            echo "Refusing production ingest worker input: ingest_worker_operator must be a safe token."
            exit 1
          fi
          if [ -n "${PRODUCTION_INGEST_WORKER_APPLY_ACK:-}" ] &&
            [ "$PRODUCTION_INGEST_WORKER_APPLY_ACK" != "explicit-bounded-production-ingest-worker-apply" ]; then
            echo "Refusing production ingest worker input: ingest_worker_apply_ack is invalid."
            exit 1
          fi
          if [ "${RUN_PRODUCTION_INGEST_WORKER_APPLY:-false}" = "true" ]; then
            if [ "${PRODUCTION_INGEST_WORKER_APPLY_ACK:-}" != "explicit-bounded-production-ingest-worker-apply" ]; then
              echo "Refusing production ingest worker input: ingest_worker_apply_ack is required for apply."
              exit 1
            fi
            if ! printf '%s' "${PRODUCTION_INGEST_WORKER_OPERATOR:-}" | grep -Eq '^[a-zA-Z0-9_.:-]{1,120}$'; then
              echo "Refusing production ingest worker input: ingest_worker_operator is required for apply and must be a safe token."
              exit 1
            fi
          fi

          ssh -i ~/.ssh/production_deploy_key -p "$PRODUCTION_SSH_PORT" "$PRODUCTION_USER@$PRODUCTION_HOST" bash -s -- \
            "$TARGET_SHA" \
            "$RUN_PRODUCTION_INGEST_WORKER" \
            "$RUN_PRODUCTION_INGEST_WORKER_DRY_RUN" \
            "$RUN_PRODUCTION_INGEST_WORKER_APPLY" \
            "$PRODUCTION_INGEST_WORKER_MAX_JOBS" \
            "$PRODUCTION_INGEST_WORKER_OPERATOR" \
            "$PRODUCTION_INGEST_WORKER_APPLY_ACK" <<'REMOTE'
            set -euo pipefail
            TARGET_SHA="${1:?missing target sha}"
            RUN_PRODUCTION_INGEST_WORKER="${2:-false}"
            RUN_PRODUCTION_INGEST_WORKER_DRY_RUN="${3:-false}"
            RUN_PRODUCTION_INGEST_WORKER_APPLY="${4:-false}"
            PRODUCTION_INGEST_WORKER_MAX_JOBS="${5:-}"
            PRODUCTION_INGEST_WORKER_OPERATOR="${6:-}"
            PRODUCTION_INGEST_WORKER_APPLY_ACK="${7:-}"

            if ! printf '%s' "$TARGET_SHA" | grep -Eq '^[0-9a-f]{40}$'; then
              echo "Refusing production deploy: remote TARGET_SHA is invalid."
              exit 1
            fi

            cd /opt/creditregulatorpro/app
            git fetch --prune origin
            git checkout --force "$TARGET_SHA"
            deployed_sha="$(git rev-parse HEAD)"
            target_sha="$(git rev-parse "$TARGET_SHA")"
            if [ "$deployed_sha" != "$target_sha" ]; then
              echo "Production checkout SHA mismatch: expected ${target_sha}, got ${deployed_sha}."
              exit 1
            fi
            echo "Production checkout verified at ${deployed_sha}."
            echo "Production deploy evidence: target_sha=${TARGET_SHA} checked_out_sha=${deployed_sha} compose_file=docker-compose.production.yml."
            corepack enable
            corepack prepare pnpm@10 --activate
            pnpm install --frozen-lockfile
            pnpm run storage:durability-contract -- --environment production --compose docker-compose.production.yml --service creditregulatorpro --preflight --no-write-evidence
            pnpm run ingest:worker-boundary-evidence -- --preflight --no-write-evidence
            pnpm run build
            docker rm -f creditregulatorpro-app 2>/dev/null || true
            docker rm -f creditregulatorpro-ingest-worker 2>/dev/null || true
            docker compose -f docker-compose.production.yml up -d --build creditregulatorpro creditregulatorpro-ingest-worker
            docker ps --filter name=creditregulatorpro-app
            docker ps --filter name=creditregulatorpro-ingest-worker

            run_production_ingest_worker_plan() {
              if [ "${RUN_PRODUCTION_INGEST_WORKER:-false}" != "true" ]; then
                echo "Skipping production ingest worker. Manual workflow_dispatch input is required."
                return 0
              fi

              if [ "${RUN_PRODUCTION_INGEST_WORKER_DRY_RUN:-false}" = "true" ] &&
                [ "${RUN_PRODUCTION_INGEST_WORKER_APPLY:-false}" = "true" ]; then
                echo "Refusing production ingest worker: choose dry-run or apply, not both."
                exit 1
              fi

              case "${PRODUCTION_INGEST_WORKER_MAX_JOBS:-}" in
                1|2|3|4|5) ;;
                *)
                  echo "Refusing production ingest worker: ingest_worker_max_jobs must be 1-5."
                  exit 1
                  ;;
              esac

              if [ "${RUN_PRODUCTION_INGEST_WORKER_DRY_RUN:-false}" = "true" ]; then
                echo "Running read-only bounded production ingest worker dry-run."
                echo "Production ingest worker evidence: mode=dry-run max_jobs=${PRODUCTION_INGEST_WORKER_MAX_JOBS} mutates_queue=false."
                docker exec \
                  -e CRP_ENV=production \
                  -e PRODUCTION_INGEST_WORKER_MAX_JOBS="$PRODUCTION_INGEST_WORKER_MAX_JOBS" \
                  creditregulatorpro-app bash -lc '
                    set -euo pipefail
                    pnpm run ingest:worker -- --dry-run --max-jobs "$PRODUCTION_INGEST_WORKER_MAX_JOBS" --concurrency 1 --worker-id production-ingest-worker-dry-run --source authenticated_ingest_process
                  '
                return 0
              fi

              if [ "${PRODUCTION_INGEST_WORKER_APPLY_ACK:-}" != "explicit-bounded-production-ingest-worker-apply" ]; then
                echo "Refusing production ingest worker apply: ingest_worker_apply_ack is missing or invalid."
                exit 1
              fi
              if ! printf '%s' "${PRODUCTION_INGEST_WORKER_OPERATOR:-}" | grep -Eq '^[a-zA-Z0-9_.:-]{1,120}$'; then
                echo "Refusing production ingest worker apply: ingest_worker_operator must be a safe token."
                exit 1
              fi

              echo "Running bounded one-shot production ingest worker apply."
              echo "Production ingest worker evidence: mode=apply max_jobs=${PRODUCTION_INGEST_WORKER_MAX_JOBS} failure_stops_workflow=true."
              docker exec \
                -e CRP_ENV=production \
                -e CRP_PRODUCTION_INGEST_WORKER_APPLY="$PRODUCTION_INGEST_WORKER_APPLY_ACK" \
                -e CRP_PRODUCTION_INGEST_WORKER_ONE_SHOT=true \
                -e CRP_PRODUCTION_INGEST_WORKER_MAX_JOBS="$PRODUCTION_INGEST_WORKER_MAX_JOBS" \
                -e CRP_PRODUCTION_INGEST_WORKER_OPERATOR="$PRODUCTION_INGEST_WORKER_OPERATOR" \
                creditregulatorpro-app bash -lc '
                  set -euo pipefail
                  pnpm run ingest:worker -- --apply --max-jobs "$CRP_PRODUCTION_INGEST_WORKER_MAX_JOBS" --concurrency 1 --worker-id production-bounded-ingest-worker --source authenticated_ingest_process
                '
            }

            run_production_ingest_worker_plan

            git log -1 --oneline
          REMOTE

      - name: Verify production health
        env:
          PRODUCTION_APP_URL: ${{ vars.PRODUCTION_APP_URL || 'https://creditregulatorpro.com' }}
        run: |
          set -euo pipefail

          base_url="${PRODUCTION_APP_URL%/}"
          invalid_session_cookie="floot_built_app_session=invalid-production-readiness-probe"

          wait_for_status() {
            local label="$1"
            local method="$2"
            local path="$3"
            local accepted_regex="$4"
            local extra_header="${5:-}"
            local url="${base_url}${path}"
            local status_code
            local curl_headers=(-H "User-Agent: creditregulatorpro-production-deploy-health/1.0")

            if [ -n "$extra_header" ]; then
              curl_headers+=(-H "$extra_header")
            fi

            for attempt in $(seq 1 30); do
              if [ "$method" = "HEAD" ]; then
                if status_code="$(curl -sS -L -I "${curl_headers[@]}" -o /dev/null -w '%{http_code}' "$url" 2>/dev/null)"; then
                  :
                else
                  status_code="curl_error"
                fi
              else
                if status_code="$(curl -sS -L -X "$method" "${curl_headers[@]}" -o /dev/null -w '%{http_code}' "$url" 2>/dev/null)"; then
                  :
                else
                  status_code="curl_error"
                fi
              fi

              if printf '%s' "$status_code" | grep -Eq "$accepted_regex"; then
                echo "Production health check ${label} passed on attempt ${attempt} with HTTP ${status_code}."
                return 0
              fi

              echo "Production health check ${label} retry ${attempt}/30 returned HTTP ${status_code}."
              sleep 2
            done

            echo "Production health check ${label} failed after 30 attempts."
            return 1
          }

          wait_for_status "root route" "HEAD" "/" '^[23][0-9][0-9]$'
          wait_for_status "login route" "GET" "/login" '^[23][0-9][0-9]$'
          wait_for_status "auth session denial" "GET" "/_api/auth/session" '^(401|403)$'
          wait_for_status "report artifact list denial" "GET" "/_api/report-artifact/list?limit=1" '^(401|403)$'
          wait_for_status "packet list denial" "GET" "/_api/packet/list?limit=1" '^(401|403)$'
          wait_for_status "evidence event list denial" "GET" "/_api/evidence/list?limit=1" '^(401|403)$'
          wait_for_status "response document list denial" "GET" "/_api/responses/list?limit=1" '^(401|403)$'
          wait_for_status "support ticket list denial" "GET" "/_api/support-ticket/list?limit=1" '^(401|403)$'
          wait_for_status "invalid session auth denial" "GET" "/_api/auth/session" '^(401|403)$' "Cookie: ${invalid_session_cookie}"
          wait_for_status "invalid session report artifact list denial" "GET" "/_api/report-artifact/list?limit=1" '^(401|403)$' "Cookie: ${invalid_session_cookie}"
          wait_for_status "invalid session packet list denial" "GET" "/_api/packet/list?limit=1" '^(401|403)$' "Cookie: ${invalid_session_cookie}"
          wait_for_status "invalid session evidence event list denial" "GET" "/_api/evidence/list?limit=1" '^(401|403)$' "Cookie: ${invalid_session_cookie}"
          wait_for_status "invalid session response document list denial" "GET" "/_api/responses/list?limit=1" '^(401|403)$' "Cookie: ${invalid_session_cookie}"
          wait_for_status "invalid session support ticket list denial" "GET" "/_api/support-ticket/list?limit=1" '^(401|403)$' "Cookie: ${invalid_session_cookie}"
