name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      rollback_sha:
        description: "Commit SHA to deploy for rollback. Leave blank to deploy the current main branch."
        required: false
        type: string

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  check:
    name: Build check
    if: github.repository == 'dpwebb/creditregulatorpro-prod'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

  deploy:
    name: Deploy to production server
    if: github.repository == 'dpwebb/creditregulatorpro-prod'
    runs-on: ubuntu-latest
    needs: check
    environment: production
    steps:
      - name: Choose commit to deploy
        id: target
        run: |
          if [ -n "${{ inputs.rollback_sha }}" ]; then
            echo "sha=${{ inputs.rollback_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare SSH
        env:
          PRODUCTION_SSH_PRIVATE_KEY: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_SSH_PORT: ${{ secrets.PRODUCTION_SSH_PORT || '22' }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$PRODUCTION_SSH_PRIVATE_KEY" > ~/.ssh/production_deploy_key.raw
          python3 - <<'PY'
          import base64
          import binascii
          from pathlib import Path

          raw_path = Path.home() / ".ssh" / "production_deploy_key.raw"
          key_path = Path.home() / ".ssh" / "production_deploy_key"
          raw = raw_path.read_text().strip()

          if (raw.startswith('"') and raw.endswith('"')) or (raw.startswith("'") and raw.endswith("'")):
              raw = raw[1:-1].strip()

          def normalize_newlines(text: str) -> str:
              return text.replace("\r\n", "\n").replace("\r", "\n").strip()

          def looks_like_private_key(text: str) -> bool:
              normalized = normalize_newlines(text)
              if "\\n" in normalized:
                  return False

              lines = [line.strip() for line in normalized.split("\n") if line.strip()]
              if len(lines) < 3:
                  return False

              begin = lines[0]
              end = lines[-1]

              return (
                  begin.startswith("-----BEGIN ")
                  and begin.endswith("PRIVATE KEY-----")
                  and end.startswith("-----END ")
                  and end.endswith("PRIVATE KEY-----")
              )

          def base64_candidates(text: str):
              compact = "".join(text.split())
              if not compact:
                  return

              for decoder in (base64.b64decode, base64.urlsafe_b64decode):
                  for candidate in (compact, compact + "=" * ((4 - len(compact) % 4) % 4)):
                      try:
                          decoded = decoder(candidate).decode("utf-8")
                      except (binascii.Error, UnicodeDecodeError, ValueError):
                          continue
                      yield normalize_newlines(decoded)

          key = None
          direct_candidates = [
              normalize_newlines(raw.replace("\\n", "\n")),
              normalize_newlines(raw),
          ]

          for candidate in direct_candidates:
              if looks_like_private_key(candidate):
                  key = candidate
                  break

          if key is None:
              for candidate in direct_candidates:
                  for decoded in base64_candidates(candidate):
                      if looks_like_private_key(decoded):
                          key = decoded
                          break
                  if key is not None:
                      break

          if key is None:
              raise SystemExit(
                  "PRODUCTION_SSH_PRIVATE_KEY is invalid. Store a full SSH private key "
                  "(BEGIN/END ... PRIVATE KEY) or base64 of that full text."
              )

          key_path.write_text(key + "\n")
          raw_path.unlink()
          PY
          chmod 600 ~/.ssh/production_deploy_key
          ssh-keygen -y -f ~/.ssh/production_deploy_key >/dev/null
          ssh-keyscan -p "$PRODUCTION_SSH_PORT" "$PRODUCTION_HOST" >> ~/.ssh/known_hosts

      - name: Deploy selected commit
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
          PRODUCTION_SSH_PORT: ${{ secrets.PRODUCTION_SSH_PORT || '22' }}
          TARGET_SHA: ${{ steps.target.outputs.sha }}
        run: |
          ssh -i ~/.ssh/production_deploy_key -p "$PRODUCTION_SSH_PORT" "$PRODUCTION_USER@$PRODUCTION_HOST" "TARGET_SHA='$TARGET_SHA' bash -s" <<'REMOTE'
            set -euo pipefail

            cd /opt/creditregulatorpro/app
            git fetch --prune origin
            git checkout --force "$TARGET_SHA"
            cp docker-compose.production.yml docker-compose.yml
            corepack enable
            corepack prepare pnpm@10 --activate
            pnpm install --frozen-lockfile
            pnpm run build
            docker rm -f creditregulatorpro-app 2>/dev/null || true
            docker compose up -d --build creditregulatorpro
            docker ps --filter name=creditregulatorpro-app
            git log -1 --oneline
          REMOTE
