name: PR regression guardrails

on:
  pull_request:
    branches:
      - staging
  workflow_dispatch:
  schedule:
    - cron: "23 8 * * 1"

jobs:
  changed-validation:
    name: Changed-area validation before merge
    if: github.repository == 'dpwebb/creditregulatorpro-staging'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run changed-area validation tier
        env:
          VALIDATION_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
          VALIDATION_HEAD_SHA: ${{ github.sha }}
        run: pnpm run validate:changed -- --head "$VALIDATION_HEAD_SHA"

  pre-promotion-automated:
    name: Scheduled pre-promotion automated guardrail
    if: github.repository == 'dpwebb/creditregulatorpro-staging' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: creditregulatorpro_release_validation
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d creditregulatorpro_release_validation"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bootstrap isolated release validation database
        env:
          CRP_LOCAL_DEV: "true"
          LOCAL_DATABASE_NAME: creditregulatorpro_release_validation
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/creditregulatorpro_release_validation
          FLOOT_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/creditregulatorpro_release_validation
        run: |
          pnpm run bootstrap:local-auth-schema
          pnpm run bootstrap:local-app-fixtures

      - name: Run release validation tier
        env:
          VALIDATION_BASE_SHA: ${{ github.event.before || '' }}
          VALIDATION_HEAD_SHA: ${{ github.sha }}
          CRP_LOCAL_DEV: "true"
          LOCAL_DATABASE_NAME: creditregulatorpro_release_validation
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/creditregulatorpro_release_validation
          FLOOT_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/creditregulatorpro_release_validation
        run: pnpm run validate:release -- --head "$VALIDATION_HEAD_SHA"
