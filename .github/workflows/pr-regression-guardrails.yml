name: PR regression guardrails

on:
  pull_request:
    branches:
      - staging

jobs:
  golden-path:
    name: Golden path before merge
    if: github.repository == 'dpwebb/creditregulatorpro-staging'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run golden path regression dashboard
        run: pnpm run test:golden-path
